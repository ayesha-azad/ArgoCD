apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-deployment
  namespace: react-ns
  labels:
    app: react-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: playzone
          image: ayeshaazad/react-eks-app:latest
          ports:
            - containerPort: 80
