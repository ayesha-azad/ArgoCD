apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-app
  namespace: argocd
spec:
  project: react-project
  destination:
    namespace: react-ns
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/ayesha-azad/ArgoCD.git
    targetRevision: main
    path: react-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
